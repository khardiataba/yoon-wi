services:
  - type: web
    name: ubbi-ndar-backend
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CURRENCY
        value: xof
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: ENABLE_OCR_VERIFICATION
        value: "false"
      - key: ADMIN_USER_ID
        sync: false
